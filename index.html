<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Landscape Portrait Transition</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="device">
    <div id="top-bar-landscape">
      <div class="actions-left">
        <img src="img/back-button.svg" alt="Back">
        <img src="img/forward-button.svg" alt="Forward">
      </div>
      <div class="address-bar-wrapper">
        <div class="address-bar">
          <img src="img/shield.svg" alt="Security" class="bar-icon">
          <span class="url-text">bbc.com</span>
          <img src="img/refresh.svg" alt="Refresh" class="bar-icon">
          <img src="img/share.svg" alt="Share" class="bar-icon">
          <div class="url-divider"></div>
          <img src="img/ai.svg" alt="AI Chat" class="bar-icon">
        </div>
      </div>
      <div class="actions-right">
        <img src="img/fire-button.svg" alt="Fire">
        <img src="img/tabs-button.svg" alt="Tabs">
        <img src="img/menu-button.svg" alt="Menu">
      </div>
    </div>
    <div id="portrait-chrome">
      <div id="status-bar-portrait">
        <img src="img/📱 statusbar.svg" alt="Status Bar">
      </div>
      <div id="top-bar-portrait">
        <div class="address-bar">
          <img src="img/shield.svg" alt="Security" class="bar-icon">
          <span class="url-text">bbc.com</span>
          <img src="img/refresh.svg" alt="Refresh" class="bar-icon">
          <img src="img/share.svg" alt="Share" class="bar-icon">
          <div class="url-divider"></div>
          <img src="img/ai.svg" alt="AI Chat" class="bar-icon">
        </div>
      </div>
    </div>
    <div id="bottom-bar-portrait">
      <div class="bottom-bar-buttons">
        <div class="bottom-bar-btn"><img src="img/back-button.svg" alt="Back"></div>
        <div class="bottom-bar-btn"><img src="img/forward-button.svg" alt="Forward"></div>
        <div class="bottom-bar-btn"><img src="img/fire-button.svg" alt="Fire"></div>
        <div class="bottom-bar-btn"><img src="img/tabs-button.svg" alt="Tabs"></div>
        <div class="bottom-bar-btn"><img src="img/menu-button.svg" alt="Menu"></div>
      </div>
      <div class="home-indicator">
        <div class="home-indicator-bar"></div>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
